        <div v-if="showDesktopStatus && isDesktopMode" class="modal-overlay" @click.self="showDesktopStatus = false">
            <div class="modal-content desktop-status-modal">
                <div class="modal-header">
                    <h2>桌面状态</h2>
                    <button class="modal-close" @click="showDesktopStatus = false">✕</button>
                </div>
                <div class="modal-body desktop-status-body">
                    <div v-if="desktopDiagnosticsLoading" class="desktop-status-loading">
                        <div class="loading-spinner"></div>
                        <span>正在检查桌面环境...</span>
                    </div>
                    <p v-if="desktopDiagnosticsError" class="error-message">{{ desktopDiagnosticsError }}</p>

                    <template v-if="desktopDiagnostics">
                        <section class="desktop-status-overview">
                            <div>
                                <span>版本</span>
                                <strong>{{ desktopDiagnostics.version }}</strong>
                            </div>
                            <div>
                                <span>平台</span>
                                <strong>{{ desktopPlatformLabel }} {{ desktopDiagnostics.architecture }}</strong>
                            </div>
                            <div>
                                <span>运行方式</span>
                                <strong>{{ desktopPackageLabel }}</strong>
                            </div>
                            <div>
                                <span>系统</span>
                                <strong>{{ desktopDiagnostics.system.name }} {{ desktopDiagnostics.system.release }}</strong>
                            </div>
                            <div>
                                <span>渲染器</span>
                                <strong>{{ desktopDiagnostics.renderer }}</strong>
                            </div>
                        </section>

                        <section class="desktop-status-section">
                            <div class="desktop-section-heading">
                                <h3>运行检查</h3>
                                <button class="btn-small" @click="loadDesktopDiagnostics" :disabled="desktopDiagnosticsLoading">刷新</button>
                            </div>
                            <div class="desktop-check-list">
                                <div v-for="check in desktopDiagnostics.checks" :key="check.key" class="desktop-check-row" :class="`status-${check.status}`">
                                    <span class="desktop-check-indicator" aria-hidden="true"></span>
                                    <strong>{{ check.label }}</strong>
                                    <span>{{ check.message }}</span>
                                    <em>{{ desktopCheckStatusLabel(check.status) }}</em>
                                </div>
                            </div>
                        </section>

                        <section class="desktop-status-section">
                            <h3>本地目录</h3>
                            <div class="desktop-directory-list">
                                <div v-for="(directory, kind) in desktopDiagnostics.directories" :key="kind" class="desktop-directory-row">
                                    <div>
                                        <strong>{{ directory.label }}</strong>
                                        <code>{{ directory.path }}</code>
                                    </div>
                                    <button v-if="desktopCapabilities.directory_open" class="btn-small" @click="openDesktopDirectory(kind)">打开</button>
                                </div>
                            </div>
                        </section>

                        <section class="desktop-status-section desktop-update-section">
                            <div class="desktop-section-heading">
                                <h3>版本更新</h3>
                                <button class="btn-small" @click="checkDesktopUpdates" :disabled="desktopUpdateChecking || desktopUpdateBusy">
                                    {{ desktopUpdateChecking ? '检查中...' : '手动检查' }}
                                </button>
                            </div>
                            <p v-if="desktopUpdateResult && desktopUpdateResult.status === 'up_to_date'" class="info-message">当前已是最新正式版本。</p>
                            <div v-if="desktopUpdateResult && ['available', 'downloading', 'ready', 'installing'].includes(desktopUpdateResult.status)" class="desktop-update-available">
                                <div class="desktop-update-copy">
                                    <strong>可更新到 {{ desktopUpdateResult.latest_version }}</strong>
                                    <span v-if="desktopUpdateResult.notes">{{ desktopUpdateResult.notes }}</span>
                                    <progress v-if="desktopUpdateResult.status === 'downloading'" class="desktop-update-progress" max="100" :value="desktopUpdateProgress"></progress>
                                </div>
                                <div class="desktop-update-actions">
                                    <button
                                        v-if="desktopUpdateActionLabel"
                                        class="btn-secondary"
                                        @click="handleDesktopUpdateAction"
                                        :disabled="desktopUpdateResult.status === 'downloading' || desktopUpdateResult.status === 'installing'"
                                    >{{ desktopUpdateActionLabel }}</button>
                                    <button v-if="desktopUpdateResult.status === 'downloading'" class="btn-small danger-quiet" @click="cancelDesktopUpdateDownload">取消</button>
                                </div>
                            </div>
                            <p v-if="desktopUpdateResult && desktopUpdateResult.message && desktopUpdateResult.status !== 'error'" class="info-message">{{ desktopUpdateResult.message }}</p>
                            <p v-if="desktopUpdateError" class="error-message">{{ desktopUpdateError }}</p>
                        </section>
                    </template>
                </div>
                <div class="modal-footer desktop-status-footer">
                    <button class="btn-secondary" @click="copyDesktopDiagnostics" :disabled="!desktopDiagnostics">复制诊断信息</button>
                    <button class="btn-primary inline" @click="showDesktopStatus = false">完成</button>
                </div>
            </div>
        </div>

        <div
            v-if="showDesktopCloseConfirm && isDesktopMode"
            class="modal-overlay desktop-close-overlay"
            role="presentation"
            @click.self="cancelDesktopClose"
        >
            <div class="modal-content desktop-close-modal" role="dialog" aria-modal="true" aria-labelledby="desktop-close-title">
                <div class="modal-header">
                    <h2 id="desktop-close-title">关闭 SecretBase</h2>
                    <button class="modal-close" type="button" title="取消关闭" @click="cancelDesktopClose">✕</button>
                </div>
                <div class="modal-body desktop-close-body">
                    <p v-if="desktopSupportsTray">你可以将窗口隐藏到系统托盘，也可以完全退出应用。隐藏前会立即锁定密码库。</p>
                    <p v-else>关闭窗口将完全退出应用并停止本地服务，也可以取消并继续使用。</p>
                    <label class="desktop-close-remember" for="desktop_close_remember">
                        <input
                            id="desktop_close_remember"
                            type="checkbox"
                            v-model="desktopCloseRemember"
                            :disabled="desktopCloseSubmitting"
                        >
                        <span>{{ desktopSupportsTray ? '不再提醒，记住本次选择' : '不再提醒，以后直接退出' }}</span>
                    </label>
                    <p v-if="desktopCloseError" class="error-message">{{ desktopCloseError }}</p>
                </div>
                <div class="modal-footer desktop-close-actions">
                    <button class="btn-secondary" type="button" :disabled="desktopCloseSubmitting" @click="cancelDesktopClose">取消</button>
                    <button class="btn-danger" type="button" :disabled="desktopCloseSubmitting" @click="resolveDesktopClose('exit')">退出应用</button>
                    <button v-if="desktopSupportsTray" class="btn-primary inline" type="button" :disabled="desktopCloseSubmitting" @click="resolveDesktopClose('tray')">
                        {{ desktopCloseSubmitting ? '处理中...' : '隐藏到托盘' }}
                    </button>
                </div>
            </div>
        </div>
