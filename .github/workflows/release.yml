name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  vault-core:
    uses: ./.github/workflows/reusable-vault-core.yml

  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python scripts/run-release-checks.py
      - name: Verify Linux local bootstrap
        if: runner.os != 'Windows'
        run: scripts/start-local.sh --dry-run --data-root "$RUNNER_TEMP/secretbase-local"
      - name: Verify Windows source bootstrap
        if: runner.os == 'Windows'
        uses: ./.github/actions/verify-windows-bootstrap

  windows-desktop:
    uses: ./.github/workflows/reusable-windows-desktop.yml
    with:
      retention-days: 30

  macos-desktop:
    uses: ./.github/workflows/reusable-macos-desktop.yml
    with:
      retention-days: 30

  android:
    uses: ./.github/workflows/reusable-android.yml
    with:
      retention-days: 30
      run-emulators: false
      require-release-signing: true
      environment-name: release
    secrets: inherit

  release:
    needs: [vault-core, verify, windows-desktop, macos-desktop, android]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download Windows desktop release assets
        uses: actions/download-artifact@v8
        with:
          name: secretbase-windows-x64
          path: release-input/windows
      - name: Download macOS desktop release assets
        uses: actions/download-artifact@v8
        with:
          name: secretbase-macos-arm64
          path: release-input/macos
      - name: Download Android release assets
        uses: actions/download-artifact@v8
        with:
          name: secretbase-android-packages
          path: release-input/android
      - name: Prepare unified release assets
        run: |
          (cd release-input/windows && sha256sum -c SHA256SUMS.txt)
          (cd release-input/macos && sha256sum -c SHA256SUMS.txt)
          (cd release-input/android && sha256sum -c SHA256SUMS.txt)
          mkdir -p release-assets
          cp release-input/windows/SecretBase-v*-windows-x64.zip release-assets/
          cp release-input/windows/SecretBase-v*-windows-x64-setup.exe release-assets/
          cp release-input/macos/SecretBase-v*-macos-arm64.dmg release-assets/
          cp release-input/macos/SecretBase-v*-macos-arm64.zip release-assets/
          cp release-input/android/SecretBase-v*-android-*.apk release-assets/
          cp release-input/android/ANDROID-METADATA.json release-assets/
      - name: Validate release tag
        run: |
          version=$(sed -n 's/^APP_VERSION = "\([0-9][0-9.]*\)"/\1/p' backend/version.py)
          android_version=$(sed -n 's/^version: \([^+]*\).*/\1/p' mobile/secretbase_app/pubspec.yaml)
          test -n "$version"
          test "$android_version" = "$version"
          test "$GITHUB_REF_NAME" = "v$version"
      - name: Generate signed update manifest
        env:
          UPDATE_SIGNING_PRIVATE_KEY_PEM_BASE64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_PEM_BASE64 }}
        run: |
          version=${GITHUB_REF_NAME#v}
          python scripts/generate-update-manifest.py \
            --version "$version" \
            --assets-dir release-assets \
            --output-dir release-assets
          rm release-assets/ANDROID-METADATA.json
          (cd release-assets && sha256sum -- *.apk *.dmg *.exe *.json *.sig *.zip > SHA256SUMS.txt)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "SecretBase $GITHUB_REF_NAME"
          fi
