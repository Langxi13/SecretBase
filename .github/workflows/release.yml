name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python scripts/run-release-checks.py
      - name: Verify Linux local bootstrap
        if: runner.os == 'Linux'
        run: scripts/start-local.sh --dry-run --data-root "$RUNNER_TEMP/secretbase-local"
      - name: Verify Windows source bootstrap
        if: runner.os == 'Windows'
        uses: ./.github/actions/verify-windows-bootstrap

  desktop:
    uses: ./.github/workflows/reusable-windows-desktop.yml
    with:
      retention-days: 30

  release:
    needs: [verify, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download Windows desktop release assets
        uses: actions/download-artifact@v8
        with:
          name: secretbase-windows-x64
          path: release-assets
      - name: Validate release tag
        run: |
          version=$(sed -n 's/^APP_VERSION = "\([0-9][0-9.]*\)"/\1/p' backend/version.py)
          test -n "$version"
          test "$GITHUB_REF_NAME" = "v$version"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "SecretBase $GITHUB_REF_NAME"
          fi
