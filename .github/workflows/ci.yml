name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  vault-core:
    uses: ./.github/workflows/reusable-vault-core.yml

  release-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python scripts/run-release-checks.py
      - name: Verify Linux local bootstrap
        if: runner.os != 'Windows'
        run: scripts/start-local.sh --dry-run --data-root "$RUNNER_TEMP/secretbase-local"
      - name: Verify Windows source bootstrap
        if: runner.os == 'Windows'
        uses: ./.github/actions/verify-windows-bootstrap
