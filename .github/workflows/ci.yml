name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  release-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python scripts/run-release-checks.py
      - name: Verify Linux local bootstrap
        if: runner.os == 'Linux'
        run: scripts/start-local.sh --dry-run --data-root "$RUNNER_TEMP/secretbase-local"
      - name: Verify Windows local bootstrap
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/start-local.ps1 -DryRun -DataRoot "$env:RUNNER_TEMP\secretbase-local"
