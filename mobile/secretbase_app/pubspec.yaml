name: secretbase
description: "SecretBase 离线加密密码库 Android 客户端。"
publish_to: 'none'
version: 5.1.2+5010200

environment:
  sdk: ^3.12.2

dependencies:
  crypto: ^3.0.7
  cryptography: ^2.7.0
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  http: ^1.6.0
  intl: ^0.20.2
  secretbase_mobile:
    path: rust_builder
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
